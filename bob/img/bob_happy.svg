<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#000000"/>
  <!-- Green sparkles -->
  <text x="95" y="75" font-size="38" fill="#84cc16">✦</text>
  <text x="265" y="65" font-size="44" fill="#84cc16">✦</text>
  <text x="310" y="130" font-size="32" fill="#84cc16">✦</text>
  <!-- Body shadow -->
  <ellipse cx="202" cy="262" rx="80" ry="60" fill="#b84a00" opacity="0.3"/>
