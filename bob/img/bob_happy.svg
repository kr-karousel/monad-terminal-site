  <ellipse cx="198" cy="270" rx="80" ry="72" fill="#4a7fd4"/>
  <ellipse cx="198" cy="285" rx="68" ry="58" fill="#3a6bc4"/>
  <!-- Diamond logo -->
  <rect x="183" y="282" width="30" height="30" rx="3" fill="#2a5ab4" transform="rotate(45 198 297)"/>
  <rect x="187" y="286" width="22" height="22" rx="2" fill="#fff" transform="rotate(45 198 297)"/>
  <!-- Orange head -->
  <ellipse cx="198" cy="192" rx="78" ry="85" fill="#e85d04"/>
  <ellipse cx="183" cy="162" rx="32" ry="25" fill="#f97316" opacity="0.5"/>
  <!-- Happy squinting eyes -->
  <path d="M158 175 Q178 160 198 175" fill="none" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
  <path d="M200 175 Q220 160 240 175" fill="none" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
  <ellipse cx="178" cy="178" rx="20" ry="12" fill="white" opacity="0.6"/>
  <ellipse cx="220" cy="178" rx="20" ry="12" fill="white" opacity="0.6"/>
  <!-- Big open laughing mouth / beak -->
  <path d="M148 215 Q165 210 178 208 L185 230 Q175 250 160 242 Z" fill="#d97706"/>
  <path d="M148 215 Q160 240 165 248" fill="#b85500" opacity="0.5"/>
  <!-- Open mouth -->
  <path d="M165 220 Q192 240 218 220" fill="#c04000" opacity="0.7"/>
  <ellipse cx="192" cy="235" rx="18" ry="12" fill="#6b1a00" opacity="0.8"/>
  <!-- Blush -->
  <ellipse cx="155" cy="210" rx="18" ry="10" fill="#ff6b35" opacity="0.4"/>
  <ellipse cx="240" cy="210" rx="18" ry="10" fill="#ff6b35" opacity="0.4"/>
  <!-- Ear tuft -->
  <path d="M258 162 Q268 140 260 125" stroke="#c04000" stroke-width="4" fill="none" stroke-linecap="round"/>
